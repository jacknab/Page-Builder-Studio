kind = "web"
previewPath = "/"
title = "Webpage Editor"
version = "1.0.0"
id = "artifacts/webpage-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23795

[services.development]
run = "pnpm --filter @workspace/webpage-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/webpage-editor", "run", "build" ]
publicDir = "artifacts/webpage-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23795"
BASE_PATH = "/"
